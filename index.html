<!DOCTYPE html>
<html>
<head>
    <title>AI Terms & Conditions Summarizer</title>
    <style>
        body {
            font-family: Arial;
            background: #f4f4f4;
            text-align: center;
            padding: 30px;
        }

        textarea {
            width: 80%;
            height: 150px;
            padding: 10px;
            margin-bottom: 10px;
        }

        button {
            padding: 10px 20px;
            background: blue;
            color: white;
            border: none;
            cursor: pointer;
        }

        .box {
            margin-top: 20px;
            background: white;
            padding: 20px;
            border-radius: 10px;
        }

        .risk {
            color: red;
        }
    </style>
</head>
<body>

<h2>📄 AI Terms & Conditions Summarizer</h2>

<textarea id="inputText" placeholder="Paste Terms & Conditions here..."></textarea><br>

<button onclick="summarize()">Summarize</button>

<div class="box">
    <h3>Summary:</h3>
    <pre id="summary">⏳ Waiting...</pre>
</div>

<div class="box">
    <h3>⚠️ Risks:</h3>
    <pre id="risks">None</pre>
</div>

<div class="box">
    <h3>📊 Risk Level:</h3>
    <pre id="riskLevel">-</pre>
</div>

<script>
async function summarize() {
    const text = document.getElementById("inputText").value;

    if (!text.trim()) {
        alert("Please enter Terms & Conditions");
        return;
    }

    document.getElementById("summary").innerText = "⏳ Processing...";
    document.getElementById("risks").innerText = "";
    document.getElementById("riskLevel").innerText = "";

    const response = await fetch("http://127.0.0.1:8000/summarize", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({ text: text })
    });

    const data = await response.json();

    document.getElementById("summary").innerText = data.summary;
    document.getElementById("riskLevel").innerText = data.risk_level;

    if (data.risks.length > 0) {
        document.getElementById("risks").innerText = data.risks.join("\n");
    } else {
        document.getElementById("risks").innerText = "✅ No major risks detected";
    }
}
</script>

</body>
</html>
