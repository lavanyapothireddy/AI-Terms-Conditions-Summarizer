<!DOCTYPE html>
<html>
<head>
    <title>AI Terms & Conditions Summarizer</title>

    <style>
        body {
            font-family: Arial;
            background: #f4f4f4;
            text-align: center;
            padding: 30px;
        }

        textarea {
            width: 80%;
            height: 150px;
            padding: 10px;
            margin-bottom: 10px;
            font-size: 14px;
        }

        button {
            padding: 12px 25px;
            background: blue;
            color: white;
            border: none;
            cursor: pointer;
            font-size: 16px;
            border-radius: 5px;
        }

        button:hover {
            background: darkblue;
        }

        .box {
            margin-top: 20px;
            background: white;
            padding: 20px;
            border-radius: 10px;
            width: 80%;
            margin-left: auto;
            margin-right: auto;
            text-align: left;
        }

        pre {
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        h2 {
            color: #333;
        }
    </style>
</head>

<body>

<h2>📄 AI Terms & Conditions Summarizer</h2>

<textarea id="inputText" placeholder="Paste Terms & Conditions here..."></textarea><br>

<button onclick="summarize()">Summarize</button>

<div class="box">
    <h3>Summary:</h3>
    <pre id="summary">⏳ Waiting...</pre>
</div>

<div class="box">
    <h3>⚠️ Risks:</h3>
    <pre id="risks">None</pre>
</div>

<div class="box">
    <h3>📊 Risk Level:</h3>
    <pre id="riskLevel">-</pre>
</div>

<script>
async function summarize() {
    const text = document.getElementById("inputText").value;

    if (!text.trim()) {
        alert("Please enter Terms & Conditions text");
        return;
    }

    // Limit large input (prevents errors)
    const safeText = text.slice(0, 5000);

    document.getElementById("summary").innerText = "⏳ Processing...";
    document.getElementById("risks").innerText = "";
    document.getElementById("riskLevel").innerText = "";

    try {
        const response = await fetch(
            "https://ai-terms-conditions-summarizer.onrender.com/summarize",
            {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({ text: safeText })
            }
        );

        // Handle server errors properly
        if (!response.ok) {
            const errorText = await response.text();
            document.getElementById("summary").innerText =
                "Server Error: " + errorText;
            return;
        }

        const data = await response.json();

        document.getElementById("summary").innerText = data.summary;
        document.getElementById("risks").innerText = data.risks.join("\n");
        document.getElementById("riskLevel").innerText = data.risk_level;

    } catch (error) {
        document.getElementById("summary").innerText =
            "Error: " + error.message;
    }
}
</script>

</body>
</html>
